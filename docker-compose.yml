services:
  rag-router-service:
    container_name: RAG_router
    build: .
    ports:
      - "8030:8030"
    environment:
      RAG_ROUTER__FILE_SECURITY_URL: "http://file-security-service:8000"
      RAG_ROUTER__LIGHTRAG_URL: "http://lightrag-service:8787"
      RAG_ROUTER__FAISS_URL: "http://rag-faiss-service:8020"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8030/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal_net

networks:
  internal_net:
    name: internal_net
    external: true
